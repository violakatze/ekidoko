name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    name: ユニットテスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: 依存関係のインストール
        run: pnpm install

      - name: ユニットテスト実行
        run: pnpm test

  e2e-test:
    name: E2Eテスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: 依存関係のインストール
        run: pnpm install

      - name: Playwrightブラウザのインストール
        run: pnpm exec playwright install --with-deps chromium

      - name: E2Eテスト実行
        run: pnpm test:e2e

      - name: テストレポートのアップロード
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
